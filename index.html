<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSS Explorer | Find Your First Issue</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #7057ff;
            --mint-green: #62dbc9;
            --dark-teal: #008672;
            --bg-light: #fafbfe;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: #334155;
        }

        /* Modern Label Styling */
        .issue-label {
            display: inline-block;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 20px;
            text-transform: capitalize;
        }
        .bg-good-first { background-color: var(--primary-purple); color: white; }
        .bg-starter { background-color: var(--mint-green); color: #1a1a1a; }
        .bg-help { background-color: var(--dark-teal); color: white; }

        /* Card-based Layout */
        .search-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 2rem;
            margin-top: 2rem;
        }

        .table thead th {
            border-top: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s;
        }

        .table thead th:hover { color: var(--primary-purple); }

        /* Loading Spinner */
        #loadingOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 10;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .repo-link {
            font-weight: 600;
            color: #1e293b;
            text-decoration: none;
        }
        .repo-link:hover { color: var(--primary-purple); }
        
        .owner-prefix { color: #94a3b8; font-weight: 400; }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <span class="issue-label bg-good-first me-1">Good First Issue</span>.com
        </span>
        <div class="text-muted small d-none d-md-block">
            Questions? <a href="#" class="text-decoration-none">Twitter DM</a> <i class="fab fa-twitter"></i>
        </div>
    </div>
</nav>

<header class="container mt-5 text-center">
    <h1 class="display-5 fw-bold">Find Your Next Contribution.</h1>
    <p class="lead text-secondary">A curated list of repositories with beginner-friendly labels.</p>
</header>

<main class="container mb-5">
    <div class="search-container position-relative">
        <div id="loadingOverlay">
            <div class="spinner-border text-primary" role="status"></div>
        </div>

        <div class="row g-3 align-items-center mb-4">
            <div class="col-md-4">
                <select id="languageSelect" class="form-select form-select-lg">
                    <option value="">Select Language...</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Python">Python</option>
                    <option value="Go">Go</option>
                    <option value="Rust">Rust</option>
                    <option value="Java">Java</option>
                    <option value="TypeScript">TypeScript</option>
                </select>
            </div>
            <div class="col-md-8 text-md-end text-secondary small">
                Filtering by: <span class="issue-label bg-help">Help Wanted</span> 
                <span class="issue-label bg-starter">Starter Task</span> 
                <span class="issue-label bg-good-first">Good First Issue</span>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table align-middle" id="repoTable">
                <thead>
                    <tr>
                        <th data-sort="name">Repository</th>
                        <th data-sort="issues" class="text-center">Issues</th>
                        <th data-sort="stars" class="text-center">Stars</th>
                        <th data-sort="updated">Last Updated</th>
                    </tr>
                </thead>
                <tbody id="repoBody">
                    </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
/**
 * Professional GitHub Issue Explorer
 * Uses GitHub GraphQL API v4
 */

const GITHUB_TOKEN = "YOUR_TOKEN_HERE"; // Best practice: Use an environment variable/backend proxy

class GitHubIssueApp {
    constructor() {
        this.repositories = [];
        this.labels = ["good first issue", "easy contribution", "starter-task"];
        this.cache = new Map();
        
        this.initEventListeners();
    }

    initEventListeners() {
        $('#languageSelect').on('change', (e) => this.fetchData(e.target.value));
        
        // Sorting logic
        $('#repoTable th').on('click', (e) => {
            const sortType = $(e.currentTarget).data('sort');
            this.sortAndRender(sortType);
        });
    }

    async fetchData(language) {
        if (!language) return;
        
        this.toggleLoading(true);
        this.repositories = [];
        const results = [];

        try {
            // Fetch for all labels in parallel for performance
            const fetchPromises = this.labels.map(label => this.executeGraphQL(language, label));
            const responses = await Promise.all(fetchPromises);
            
            responses.forEach(data => {
                if (data?.data?.search?.edges) {
                    const issues = data.data.search.edges.map(e => e.node);
                    this.processIssues(issues);
                }
            });

            this.sortAndRender('issues');
        } catch (error) {
            console.error("API Error:", error);
            alert("Failed to fetch data from GitHub. Ensure your API token is valid.");
        } finally {
            this.toggleLoading(false);
        }
    }

    processIssues(issues) {
        issues.forEach(issue => {
            if (!issue.repository) return;
            
            const repoName = issue.repository.name;
            const existing = this.repositories.find(r => r.name === repoName);

            if (existing) {
                existing.issueCount++;
            } else {
                this.repositories.push({
                    owner: issue.repository.owner.login,
                    name: repoName,
                    url: issue.repository.url,
                    stars: issue.repository.stargazers.totalCount,
                    updated: new Date(issue.repository.updatedAt),
                    issueCount: 1
                });
            }
        });
    }

    async executeGraphQL(language, label) {
        const query = `
        query SearchIssues($query: String!) {
            search(query: $query, type: ISSUE, first: 50) {
                edges {
                    node {
                        ... on Issue {
                            createdAt
                            repository {
                                name
                                url
                                updatedAt
                                owner { login }
                                stargazers { totalCount }
                            }
                        }
                    }
                }
            }
        }`;

        const variables = {
            query: `label:"${label}" language:${language} state:open`
        };

        const response = await fetch('https://api.github.com/graphql', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${GITHUB_TOKEN}`
            },
            body: JSON.stringify({ query, variables })
        });

        return response.json();
    }

    sortAndRender(criteria) {
        const sorters = {
            name: (a, b) => a.name.localeCompare(b.name),
            stars: (a, b) => b.stars - a.stars,
            issues: (a, b) => b.issueCount - a.issueCount,
            updated: (a, b) => b.updated - a.updated
        };

        this.repositories.sort(sorters[criteria]);
        this.render();
    }

    render() {
        const $tbody = $('#repoBody');
        $tbody.empty();

        if (this.repositories.length === 0) {
            $tbody.append('<tr><td colspan="4" class="text-center py-5 text-muted">No repositories found for this language.</td></tr>');
            return;
        }

        this.repositories.forEach(repo => {
            const row = `
                <tr>
                    <td>
                        <a href="${repo.url}" target="_blank" class="repo-link">
                            <span class="owner-prefix">${repo.owner} /</span> ${repo.name}
                        </a>
                    </td>
                    <td class="text-center">
                        <span class="badge rounded-pill bg-light text-dark border">${repo.issueCount} Issues</span>
                    </td>
                    <td class="text-center">
                        <small class="text-secondary"><i class="fa-solid fa-star text-warning me-1"></i>${repo.stars.toLocaleString()}</small>
                    </td>
                    <td>
                        <span class="text-muted small">${this.formatDate(repo.updated)}</span>
                    </td>
                </tr>
            `;
            $tbody.append(row);
        });
    }

    formatDate(date) {
        return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).format(date);
    }

    toggleLoading(show) {
        $('#loadingOverlay').css('display', show ? 'flex' : 'none');
    }
}

// Initialize App
const app = new GitHubIssueApp();
</script>

</body>
</html>
